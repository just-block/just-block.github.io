# To enable this workflow:
# 1. Go to GitHub repo → Settings → Secrets and variables → Actions → Variables tab
# 2. Click "New repository variable"
# 3. Name: ENABLE_LANDING_DEPLOY, Value: true
# 4. Save — the workflow will run on next push to packages/landing/** or manual dispatch

name: Deploy Landing to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "packages/landing/**"
      - "package.json"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: ${{ vars.ENABLE_LANDING_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/landing/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
